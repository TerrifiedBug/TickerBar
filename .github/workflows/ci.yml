name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # latest-stable on the pinned macos-15 image. Pin to an exact
          # version (e.g. '16.4') once a known-good version is confirmed.
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build and test
        run: |
          xcodebuild -project TickerBar.xcodeproj \
            -scheme TickerBar \
            -destination 'platform=macOS' \
            test

      - name: Build widget extension
        run: |
          xcodebuild -project TickerBar.xcodeproj \
            -target TickerBarWidgetExtension \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
